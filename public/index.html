<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

#game {
    width: 100vw;
    height: 70vh;
    position: relative;
    background: #222;
}

.player {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
}

.name {
    position: absolute;
    font-size: 12px;
    transform: translate(-50%, -20px);
    white-space: nowrap;
}

#chat {
    height: 25vh;
    overflow-y: auto;
    border-top: 1px solid #333;
    padding: 5px;
}

input {
    width: 70%;
}
</style>
</head>

<body>

<div id="game"></div>

<div id="chat"></div>
<input id="msg" placeholder="chat..." />
<button onclick="send()">Send</button>

<script>
const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host);

let id = null;
let players = {};

let x = 100;
let y = 100;

let name = prompt("Nick:");

ws.onopen = () => {
    ws.send(JSON.stringify({ type: "join", name }));
};

ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === "id") {
        id = data.id;
    }

    if (data.type === "state") {
        players = data.players;
        render();
        renderChat(data.messages);
    }
};

function send() {
    const input = document.getElementById("msg");
    if (!input.value) return;

    ws.send(JSON.stringify({
        type: "chat",
        text: input.value
    }));

    input.value = "";
}

document.addEventListener("keydown", (e) => {
    let speed = 5;

    if (e.key === "w" || e.key === "ArrowUp") y -= speed;
    if (e.key === "s" || e.key === "ArrowDown") y += speed;
    if (e.key === "a" || e.key === "ArrowLeft") x -= speed;
    if (e.key === "d" || e.key === "ArrowRight") x += speed;

    ws.send(JSON.stringify({
        type: "move",
        x,
        y
    }));

    render();
});

function render() {
    const game = document.getElementById("game");
    game.innerHTML = "";

    for (let p in players) {
        let pl = players[p];

        let div = document.createElement("div");
        div.className = "player";
        div.style.left = pl.x + "px";
        div.style.top = pl.y + "px";
        div.style.background = pl.color;

        let name = document.createElement("div");
        name.className = "name";
        name.style.left = pl.x + 10 + "px";
        name.style.top = pl.y + "px";
        name.innerText = pl.name;

        game.appendChild(div);
        game.appendChild(name);
    }
}

function renderChat(msgs) {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    msgs.forEach(m => {
        let div = document.createElement("div");
        div.innerText = m.name + ": " + m.text;
        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
